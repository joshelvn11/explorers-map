services:
  web:
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${EXPLORERS_MAP_HOST_PORT:-8080}:3000"
    environment:
      EXPLORERS_MAP_SQLITE_PATH: /app/data/explorers-map.sqlite
      EXPLORERS_MAP_PUBLIC_APP_URL: ${EXPLORERS_MAP_PUBLIC_APP_URL:-http://localhost:3000}
      EXPLORERS_MAP_ACTIONS_AUTH_TOKEN: ${EXPLORERS_MAP_ACTIONS_AUTH_TOKEN}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      EXPLORERS_MAP_BOOTSTRAP_ADMIN_NAME: ${EXPLORERS_MAP_BOOTSTRAP_ADMIN_NAME:-}
      EXPLORERS_MAP_BOOTSTRAP_ADMIN_EMAIL: ${EXPLORERS_MAP_BOOTSTRAP_ADMIN_EMAIL:-}
      EXPLORERS_MAP_BOOTSTRAP_ADMIN_PASSWORD: ${EXPLORERS_MAP_BOOTSTRAP_ADMIN_PASSWORD:-}
    volumes:
      - explorers-map-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/actions/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  explorers-map-data:
